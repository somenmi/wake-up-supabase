name: Wake Up Supabase

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  ping-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Проверить, что секрет SUPABASE_PROJECTS_JSON существует
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECTS_JSON }}" ]; then
            echo "❌ Секрет SUPABASE_PROJECTS_JSON не задан."
            echo "Перейди в Settings → Secrets and variables → Actions и добавь его."
            exit 1
          fi

      - name: Разбудить проекты Supabase
        env:
          SUPABASE_PROJECTS_JSON: ${{ secrets.SUPABASE_PROJECTS_JSON }}
        run: |
          # Установим jq для парсинга JSON
          sudo apt-get update -y > /dev/null
          sudo apt-get install -y jq > /dev/null

          LENGTH=$(echo "$SUPABASE_PROJECTS_JSON" | jq '. | length')
          echo "📦 Найдено проектов: $LENGTH"

          if [ "$LENGTH" -eq 0 ]; then
            echo "⚠️ В SUPABASE_PROJECTS_JSON нет проектов."
            exit 0
          fi

          for i in $(seq 0 $((LENGTH - 1))); do
            URL=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].url")
            KEY=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].anon_key")

            if [ -z "$URL" ] || [ "$URL" = "null" ]; then
              echo "⚠️ Пропускаю проект $i — нет url."
              continue
            fi

            if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
              echo "⚠️ Пропускаю $URL — нет anon_key."
              continue
            fi

            echo "=================================="
            echo "🚀 Проект: $URL"

            # 1. Health-эндпоинт (auth/v1/health) – показывает, жив ли проект
            HEALTH_URL="${URL%/}/auth/v1/health"
            echo "🌐 Пингую health: $HEALTH_URL"

            set +e
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $KEY" "$HEALTH_URL")
            CURL_EXIT=$?
            set -e

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "❌ Curl упал с кодом $CURL_EXIT"
            elif [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Health OK (HTTP $HTTP_CODE)"
            else
              echo "❌ Health ответил не 2xx (HTTP $HTTP_CODE), но проект, скорее всего, разбужен."
            fi

            # 2. REST-эндпоинт (/rest/v1/) – дополнительный пинок для пробуждения БД
            REST_URL="${URL%/}/rest/v1/"
            echo "🌐 Пингую REST: $REST_URL"

            set +e
            HTTP_CODE_REST=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $KEY" "$REST_URL")
            CURL_EXIT_REST=$?
            set -e

            if [ "$CURL_EXIT_REST" -ne 0 ]; then
              echo "❌ REST curl упал с кодом $CURL_EXIT_REST"
            else
              echo "ℹ️ REST ответил HTTP $HTTP_CODE_REST (для пробуждения неважно)"
            fi

            echo "=================================="
          done
